name: Desplegar a Cloud Run

# Despliega la plataforma cuando cambia algo en plataforma/ en la rama master.
# Autenticacion SIN llaves: Workload Identity Federation (WIF).
# Los secretos de la app viven en Secret Manager; este workflow no los expone.
# Configura una vez con: plataforma/deploy/configurar-github-actions.ps1
# y define las Variables de repositorio (Settings > Secrets and variables > Actions > Variables):
#   GCP_PROJECT, GCP_REGION, SERVICE_NAME, WIF_PROVIDER, DEPLOY_SA, AUTH_ALLOWLIST, AUTH_URL

on:
  push:
    branches: [master]
    paths:
      - "plataforma/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write # requerido por WIF

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plataforma
    steps:
      - uses: actions/checkout@v4

      - name: Autenticar en Google Cloud (WIF, sin llaves)
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ vars.GCP_PROJECT }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SA }}

      - name: Configurar gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependencias
        run: npm ci

      - name: Obtener DATABASE_URL de Secret Manager (enmascarado)
        id: dburl
        run: |
          VAL="$(gcloud secrets versions access latest --secret=DATABASE_URL)"
          echo "::add-mask::$VAL"
          echo "value=$VAL" >> "$GITHUB_OUTPUT"

      - name: Aplicar migraciones y contenido a Neon
        env:
          DATABASE_URL: ${{ steps.dburl.outputs.value }}
        run: |
          npx prisma migrate deploy
          npm run db:seed

      - name: Desplegar a Cloud Run
        run: |
          gcloud run deploy "${{ vars.SERVICE_NAME }}" \
            --source . \
            --region "${{ vars.GCP_REGION }}" \
            --allow-unauthenticated \
            --memory 1Gi --cpu 1 --min-instances 0 \
            --set-env-vars "AUTH_ALLOWLIST=${{ vars.AUTH_ALLOWLIST }},NODE_ENV=production,AUTH_URL=${{ vars.AUTH_URL }}" \
            --set-secrets "DATABASE_URL=DATABASE_URL:latest,AUTH_SECRET=AUTH_SECRET:latest,AUTH_GOOGLE_ID=AUTH_GOOGLE_ID:latest,AUTH_GOOGLE_SECRET=AUTH_GOOGLE_SECRET:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest"
